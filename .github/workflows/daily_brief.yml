name: Daily Brief

on:
  schedule:
    - cron: '0 14 * * 1-5'   # Mon–Fri ~7:00 AM MT
    - cron: '0 15 * * 6'     # Saturday ~8:00 AM MT
  workflow_dispatch:

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run briefing agent
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY:           ${{ secrets.NEWS_API_KEY }}
          FINNHUB_API_KEY:        ${{ secrets.FINNHUB_API_KEY }}
          GNEWS_API_KEY:          ${{ secrets.GNEWS_API_KEY }}
          FRED_API_KEY:           ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY:            ${{ secrets.FMP_API_KEY }}
          ALPHA_VANTAGE_API_KEY:  ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GMAIL_USER:             ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:         ${{ secrets.GMAIL_APP_PASS }}
        run: python briefing.py

      - name: Commit updated trend radar
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Daily Brief Bot"
          git add trend_radar.json || true
          git diff --staged --quiet || git commit -m "Update trend radar [skip ci]"
          git push || true
