name: Daily Brief

on:
  schedule:
   - cron: '30 11 * * 1-5'
   - cron: '30 14 * * 6'
  workflow_dispatch:

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run briefing agent
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY:           ${{ secrets.NEWS_API_KEY }}
          FINNHUB_API_KEY:        ${{ secrets.FINNHUB_API_KEY }}
          GNEWS_API_KEY:          ${{ secrets.GNEWS_API_KEY }}
          FRED_API_KEY:           ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY:            ${{ secrets.FMP_API_KEY }}
          ALPHA_VANTAGE_API_KEY:  ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GMAIL_USER:             ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:         ${{ secrets.GMAIL_APP_PASS }}
          GOOGLE_CSE_API_KEY:     ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_CX:          ${{ secrets.GOOGLE_CSE_CX }}
        run: python briefing.py

      - name: Commit updated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Daily Brief Bot"
          git add trend_radar.json seen_contacts.json learning_progress.json study/index.html || true
          git diff --staged --quiet || git commit -m "Update brief + study tool [skip ci]"
          git push || true
